<div class="page-wrap">
  <div class="tl-panel">
    <div class="tl-header">
      <div class="tl-title"><svg data-lucide="settings"></svg>Durum Yönetimi</div>
      <div class="tl-stats" id="tlStats"></div>
    </div>
    <div class="tl-body"><div class="tl-bar" id="tlBar"></div><div class="tl-cal" id="tlCal"></div></div>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--glass-border);background:var(--glass-panel);flex-shrink:0">

    <div id="toolbar" style="display:flex;gap:6px"></div>
  </div>

</div>
    </div>
  </div>
</div>

<div id="confirmModal" class="modal-backdrop" style="display:none"><div class="modal-box modal-sm"><div class="modal-header"><span class="modal-title" id="confirmTitle">Onay</span></div><div class="modal-body"><p id="confirmMsg" style="font-size:.84rem;color:var(--text-secondary)"></p></div><div class="modal-footer"><button class="btn btn-secondary btn-sm" onclick="confirmResolve(false)">İptal</button><button class="btn btn-danger btn-sm" id="confirmYesBtn" onclick="confirmResolve(true)">Evet</button></div></div></div>
<div id="alertModal" class="modal-backdrop" style="display:none"><div class="modal-box modal-sm"><div class="modal-header"><span class="modal-title" id="alertTitle">Bilgi</span></div><div class="modal-body"><p id="alertMsg" style="font-size:.84rem;color:var(--text-secondary)"></p></div><div class="modal-footer"><button class="btn btn-primary btn-sm" onclick="document.getElementById('alertModal').style.display='none'">Tamam</button></div></div></div>
<div id="userMenuModal" class="modal-backdrop" style="display:none" onclick="if(event.target===this)closeUserMenu()"><div class="modal-box modal-sm"><div class="modal-header"><span class="modal-title">Hesap</span><button class="btn-icon" onclick="closeUserMenu()"><svg data-lucide="x" style="width:16px;height:16px"></svg></button></div><div class="modal-body" id="userMenuBody"></div></div></div>
<div id="notifPanel" style="display:none;position:fixed;top:60px;right:14px;width:300px;background:var(--glass-card-bg);border:1px solid var(--glass-border);border-radius:14px;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.2);overflow:hidden"><div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--glass-border)"><span style="font-size:.82rem;font-weight:800">Bildirimler</span><button class="btn-icon" onclick="document.getElementById('notifPanel').style.display='none'"><svg data-lucide="x" style="width:14px;height:14px"></svg></button></div><div id="notifList" style="max-height:300px;overflow-y:auto;padding:8px"><div style="text-align:center;padding:16px;font-size:.76rem;color:var(--text-muted)">Bildirim yok</div></div></div>
<div class="toast-wrap" id="toastWrap"></div>
<script src="/app/js/api.js"></script>
<script>
// ── INIT ──
(function(){
  const t=localStorage.getItem('optimizi:theme');
  if(t==='light')document.documentElement.classList.remove('dark');
  else document.documentElement.classList.add('dark');
})();

// Topbar tarih + kullanıcı
document.addEventListener('DOMContentLoaded', async () => {
  const d=new Date();
  const dn=['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'];
  const dp=document.getElementById('datePill');
  if(dp)dp.innerHTML='<svg data-lucide="calendar" style="width:14px;height:14px"></svg>'+dn[d.getDay()]+' '+d.toLocaleDateString('tr-TR');
  
  // Kullanıcı bilgisi
  window._optCurrentUser = await OPT.currentUser().catch(()=>null);
  const u = window._optCurrentUser;
  if(u){
    const av=document.getElementById('sbAvatar');const nm=document.getElementById('sbUserName');const rl=document.getElementById('sbUserRole');
    if(av){av.textContent=u.initials||u.name[0];av.style.background=u.avatar_color||'#6366f1';}
    if(nm)nm.textContent=u.name;
    if(rl)rl.textContent={'admin':'Yönetici','satis':'Satışçı','tasarim':'Tasarımcı','uretim':'Üretimci','depo':'Depo','izleyici':'İzleyici'}[u.role]||u.role;
    // Bildirim sayacı
    OPT.aktivite.sayac().then(c=>{const b=document.getElementById('notifBadge');if(b)b.style.display=c>0?'block':'none';}).catch(()=>{});
  }
  lucide.createIcons();
  
  // Bildirim paneli
  window.openNotifPanel = async function(){
    const panel=document.getElementById('notifPanel');
    if(panel.style.display!=='none'){panel.style.display='none';return;}
    const list=document.getElementById('notifList');
    try{
      const notifs=await OPT.aktivite.bildirimler();
      if(!notifs.length){list.innerHTML='<div style="text-align:center;padding:18px;font-size:.76rem;color:var(--text-muted)">Bildirim yok</div>';}
      else{list.innerHTML=notifs.map(n=>`<div style="display:flex;gap:8px;padding:8px 4px;border-bottom:1px solid var(--glass-border)"><div style="width:8px;height:8px;border-radius:50%;background:${n.renk||'#6366f1'};flex-shrink:0;margin-top:4px"></div><div style="flex:1;min-width:0"><div style="font-size:.75rem;font-weight:600;color:var(--text-primary)">${n.baslik||'—'}</div><div style="font-size:.65rem;color:var(--text-muted)">${n.icerik||''} · ${fmt(n.created_at)}</div></div></div>`).join('');}
      panel.style.display='block';
      OPT.aktivite.markAllRead().catch(()=>{});
      const badge=document.getElementById('notifBadge');if(badge)badge.style.display='none';
    }catch(e){list.innerHTML='<div style="text-align:center;padding:18px;font-size:.76rem;color:var(--text-muted)">Yüklenemedi</div>';panel.style.display='block';}
  };
  
  window.openUserMenu = function(){
    const u=window._optCurrentUser;if(!u)return;
    const body=document.getElementById('userMenuBody');
    const roleLabels={'admin':'Yönetici','satis':'Satışçı','tasarim':'Tasarımcı','uretim':'Üretimci','depo':'Depo','izleyici':'İzleyici'};
    body.innerHTML=`<div style="text-align:center;padding:10px 0 14px"><div style="width:44px;height:44px;border-radius:50%;background:${u.avatar_color||'#6366f1'};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:1rem;margin:0 auto 7px">${u.initials||u.name[0]||'U'}</div><div style="font-weight:800">${u.name||'—'}</div><div style="font-size:.72rem;color:var(--text-muted)">${roleLabels[u.role]||u.role}</div></div>
    <div style="display:flex;flex-direction:column;gap:5px">
      <a href="/app/sistem-ayarlari.html" class="btn btn-secondary btn-sm" style="justify-content:center">Hesap Ayarları</a>
      ${u.role==='admin'?'<a href="/app/kullanicilar.html" class="btn btn-secondary btn-sm" style="justify-content:center">Kullanıcı Yönetimi</a><a href="/app/durum-yonetimi.html" class="btn btn-secondary btn-sm" style="justify-content:center">Durum Yönetimi</a>':''}
      <button onclick="window.supabaseClient.auth.signOut().then(()=>location.href='/login')" class="btn btn-danger btn-sm" style="justify-content:center;margin-top:6px">Çıkış Yap</button>
    </div>`;
    document.getElementById('userMenuModal').style.display='flex';
    lucide.createIcons();
  };
  window.closeUserMenu = function(){document.getElementById('userMenuModal').style.display='none';};
});

let durumlar=[], sablonlar=[];
async function loadPage(){
  if(!OPT.hasRole('admin')){document.getElementById('pageMain').innerHTML='<div class="empty-state"><svg data-lucide="shield-off" style="width:36px;height:36px"></svg><h3>Yetkisiz Erişim</h3><p>Admin yetkisi gereklidir.</p></div>';lucide.createIcons();return;}
  [durumlar,sablonlar]=await Promise.all([OPT.getDurumlar().catch(()=>[]),OPT.admin.asamaSablonlari().catch(()=>[])]);
  render();
}
function render(){
  const m=document.getElementById('pageMain');if(!m)return;
  m.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card">
        <div class="card-header"><div class="card-title"><svg data-lucide="circle-dot"></svg>Sipariş Durumları</div>
          <button onclick="openAddDurum()" class="btn btn-primary btn-sm"><svg data-lucide="plus"></svg>Ekle</button>
        </div>
        <div style="padding:12px;display:flex;flex-direction:column;gap:7px">
          ${durumlar.map(d=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;border:1px solid var(--border);background:var(--input-bg)">
            <div style="width:28px;height:28px;border-radius:8px;background:${d.renk}18;display:flex;align-items:center;justify-content:center"><div style="width:10px;height:10px;border-radius:50%;background:${d.renk}"></div></div>
            <span style="flex:1;font-weight:700">${d.kod}</span>
            <span style="font-size:.65rem;color:var(--text-muted);font-family:monospace">${d.renk}</span>
            <input type="color" value="${d.renk}" title="Renk değiştir" style="width:26px;height:26px;border:none;border-radius:6px;cursor:pointer;background:none;padding:0" onchange="updateDurumColor(${d.id},this.value)">
            <button onclick="delDurum(${d.id})" class="btn-icon" style="color:#ef4444"><svg data-lucide="trash-2" style="width:12px;height:12px"></svg></button>
          </div>`).join('')}
          ${!durumlar.length?'<p style="text-align:center;color:var(--text-muted);font-size:.76rem;padding:16px">Durum bulunamadı</p>':''}
        </div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title"><svg data-lucide="layers"></svg>Üretim Aşama Şablonu</div>
          <button onclick="openAsamaEdit()" class="btn btn-secondary btn-sm"><svg data-lucide="edit-3"></svg>Düzenle</button>
        </div>
        <div id="asamaBody" style="padding:12px;display:flex;flex-direction:column;gap:6px">
          ${renderAsamaStatic(sablonlar)}
        </div>
      </div>
    </div>`;
  lucide.createIcons();
}
function renderAsamaStatic(list){
  const total=list.reduce((s,x)=>s+Number(x.agirlik||0),0)||100;
  return list.map(s=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:var(--input-bg)">
    <span style="flex:1;font-size:.76rem;font-weight:600">${s.asama_adi}</span>
    <div style="width:80px;height:4px;background:rgba(148,163,184,.2);border-radius:999px;overflow:hidden"><div style="width:${Math.round(Number(s.agirlik)/total*100)}%;height:100%;background:#6366f1"></div></div>
    <span style="font-size:.68rem;font-weight:800;color:#6366f1;min-width:30px;text-align:right">${s.agirlik}%</span>
  </div>`).join('')||'<p style="text-align:center;color:var(--text-muted);font-size:.76rem;padding:12px">Aşama bulunamadı</p>';
}
function openAddDurum(){
  const d=document.createElement('div');d.className='modal-backdrop';d.id='durModal';
  d.innerHTML=`<div class="modal-box modal-sm"><div class="modal-header"><span class="modal-title">Durum Ekle</span><button class="btn-icon" onclick="document.getElementById('durModal').remove()"><svg data-lucide="x" style="width:15px;height:15px"></svg></button></div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:8px">
      <div class="field"><label class="field-label">Durum Kodu *</label><input class="field-input" id="dkKod" placeholder="örn. Askıda"></div>
      <div class="field"><label class="field-label">Renk</label><div style="display:flex;gap:8px;align-items:center"><input type="color" id="dkRenk" value="#6366f1" style="width:40px;height:32px;border:none;border-radius:7px;cursor:pointer"><input class="field-input" id="dkRenkTxt" value="#6366f1" oninput="document.getElementById('dkRenk').value=this.value"></div></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary btn-sm" onclick="document.getElementById('durModal').remove()">İptal</button><button class="btn btn-primary btn-sm" onclick="saveDurum()">Ekle</button></div>
  </div>`;
  document.body.appendChild(d);lucide.createIcons();
}
async function saveDurum(){
  const kod=(document.getElementById('dkKod').value||'').trim();if(!kod){showAlert('Kod girin.');return;}
  try{await OPT.admin.createDurum({kod,label:kod,renk:document.getElementById('dkRenk').value,sira:durumlar.length+1});document.getElementById('durModal').remove();durumlar=await OPT.getDurumlar();render();toast('success','Eklendi',kod);}
  catch(e){toast('error','Hata',e.message);}
}
async function updateDurumColor(id,renk){
  const d=durumlar.find(x=>x.id===id);if(!d)return;
  await OPT.admin.updateDurum(id,{...d,renk}).catch(()=>{});durumlar=await OPT.getDurumlar().catch(()=>durumlar);
}
async function delDurum(id){
  const d=durumlar.find(x=>x.id===id);if(!d)return;
  showConfirm(`"${d.kod}" silinecek?`,async()=>{await OPT.admin.deleteDurum(id).catch(()=>{});durumlar=await OPT.getDurumlar();render();},'Sil','Evet');
}
function openAsamaEdit(){
  let tmp=[...sablonlar];
  const d=document.createElement('div');d.className='modal-backdrop';d.id='aeModal';
  d.innerHTML=`<div class="modal-box" style="max-width:500px"><div class="modal-header"><span class="modal-title">Aşama Şablonu Düzenle</span><button class="btn-icon" onclick="document.getElementById('aeModal').remove()"><svg data-lucide="x" style="width:15px;height:15px"></svg></button></div>
    <div class="modal-body">
      <p style="font-size:.74rem;color:var(--text-secondary);margin-bottom:10px">Toplam ağırlık 100 olmalı.</p>
      <div id="aeList" style="display:flex;flex-direction:column;gap:5px;margin-bottom:10px"></div>
      <div style="display:grid;grid-template-columns:1fr auto auto;gap:7px;align-items:end">
        <div class="field"><label class="field-label">Yeni Aşama</label><input class="field-input" id="aeNewName" placeholder="Aşama adı..."></div>
        <div class="field" style="width:70px"><label class="field-label">Ağırlık</label><input type="number" class="field-input" id="aeNewW" value="10" min="1" max="100"></div>
        <button onclick="aeAdd()" class="btn btn-primary btn-sm" style="height:32px">Ekle</button>
      </div>
      <div id="aeTotRow" style="margin-top:8px;padding:6px 10px;border-radius:7px;background:var(--input-bg);border:1px solid var(--border);display:flex;justify-content:space-between;font-size:.68rem"><span style="color:var(--text-muted)">Toplam:</span><strong id="aeTotal" style="color:#6366f1">0/100</strong></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary btn-sm" onclick="document.getElementById('aeModal').remove()">İptal</button><button class="btn btn-primary btn-sm" onclick="saveAsama()">Kaydet</button></div>
  </div>`;
  document.body.appendChild(d);window._aeTmp=[...sablonlar];aeRender();lucide.createIcons();
}
function aeRender(){
  const el=document.getElementById('aeList');if(!el)return;
  const total=window._aeTmp.reduce((s,x)=>s+Number(x.agirlik||0),0);
  el.innerHTML=window._aeTmp.map((s,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;border:1px solid var(--border);background:var(--input-bg)">
    <span style="flex:1;font-size:.74rem;font-weight:600">${s.asama_adi}</span>
    <input type="number" min="1" max="100" value="${s.agirlik}" style="width:52px;padding:2px 5px;border-radius:5px;border:1px solid var(--border);background:var(--glass-card-bg);font-size:.7rem;font-family:inherit;outline:none;text-align:right;color:var(--text-primary)" oninput="window._aeTmp[${i}].agirlik=Number(this.value)||0;aeRender()">
    <button class="btn-icon" onclick="window._aeTmp.splice(${i},1);aeRender()"><svg data-lucide="trash-2" style="width:11px;height:11px;color:#ef4444"></svg></button>
  </div>`).join('');
  const tw=document.getElementById('aeTotal');if(tw){tw.textContent=total+'/100';tw.style.color=total===100?'#10b981':total>100?'#ef4444':'#f59e0b';}
  lucide.createIcons();
}
function aeAdd(){const name=(document.getElementById('aeNewName').value||'').trim();if(!name)return;window._aeTmp.push({asama_adi:name,agirlik:Number(document.getElementById('aeNewW').value||10)});document.getElementById('aeNewName').value='';aeRender();}
async function saveAsama(){
  const total=window._aeTmp.reduce((s,x)=>s+Number(x.agirlik||0),0);
  if(total!==100){showAlert(`Toplam ağırlık ${total} — 100 olmalı.`,'Hata');return;}
  try{await OPT.admin.updateAsamaSablonlari(window._aeTmp);document.getElementById('aeModal').remove();sablonlar=await OPT.admin.asamaSablonlari();render();toast('success','Kaydedildi','Aşama şablonu güncellendi.');}
  catch(e){toast('error','Hata',e.message);}
}

// ── PAGE INIT ──
loadPage();
</script>

(function(){
  const page=window.location.pathname.split('/').pop().replace('.html','')||'genel-durum';
  document.querySelectorAll('.sb-lk[data-page],.sb-sl[data-page]').forEach(el=>{
    if(el.getAttribute('data-page')===page){
      el.classList.add('active');

(function(){const t=localStorage.getItem('optimizi:theme');if(t==='light')document.documentElement.classList.remove('dark');else document.documentElement.classList.add('dark');})();
(function(){
  const d=new Date();const dn=['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'];
  const dp=document.getElementById('datePill');
  if(dp)dp.innerHTML='<svg data-lucide="calendar" style="width:14px;height:14px"></svg>'+dn[d.getDay()]+' '+d.toLocaleDateString('tr-TR');
  fetch('https://api.frankfurter.app/latest?from=TRY&to=EUR,USD',{cache:'no-store'})
    .then(r=>r.json()).then(j=>{
      window._kurEUR=1/Number(j.rates.EUR);window._kurUSD=1/Number(j.rates.USD);
      const eu=document.getElementById('fxEur'),ud=document.getElementById('fxUsd');
      if(eu)eu.innerHTML='<strong>EUR</strong> '+window._kurEUR.toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});
      if(ud)ud.innerHTML='<strong>USD</strong> '+window._kurUSD.toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});
      if(typeof lucide!=='undefined')lucide.createIcons();
    }).catch(()=>{});
})();
const ROLE_LABELS={admin:'Yönetici',satis:'Satışçı',tasarim:'Tasarımcı',uretim:'Üretimci',depo:'Depo',izleyici:'İzleyici'};
const ROLE_COLORS={admin:'#6366f1',satis:'#10b981',tasarim:'#8b5cf6',uretim:'#ec4899',depo:'#f59e0b',izleyici:'#94a3b8'};
async function loadCurrentUser(){
  try{
    if(typeof OPT==='undefined')return;
    const u=await OPT.currentUser().catch(()=>null);window._optCurrentUser=u;if(!u)return;
    const av=document.getElementById('sbAvatar'),tb=document.getElementById('topbarAvatar'),nm=document.getElementById('sbUserName'),rl=document.getElementById('sbUserRole');
    if(av){av.textContent=u.initials||u.name?.[0]||'U';av.style.background=u.avatar_color||'#6366f1';}
    if(tb){tb.textContent=u.initials||u.name?.[0]||'U';tb.style.background=u.avatar_color||'#6366f1';}
    if(nm)nm.textContent=u.name||'—';if(rl)rl.textContent=ROLE_LABELS[u.role]||u.role;
    OPT.aktivite.sayac().then(c=>{const b=document.getElementById('notifBadge');if(b)b.style.display=c>0?'block':'none';}).catch(()=>{});
  }catch(e){}
}
function openUserMenu(){
  const u=window._optCurrentUser;if(!u)return;
  const rColor=ROLE_COLORS[u.role]||'#6b7280';
  document.getElementById('userMenuBody').innerHTML=`<div style="text-align:center;padding:10px 0 14px"><div style="width:44px;height:44px;border-radius:50%;background:${u.avatar_color||'#6366f1'};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:1rem;margin:0 auto 7px">${u.initials||u.name?.[0]||'U'}</div><div style="font-weight:800">${u.name||'—'}</div><span style="display:inline-flex;padding:2px 9px;border-radius:20px;font-size:.68rem;font-weight:700;background:${rColor}14;color:${rColor};margin-top:4px">${ROLE_LABELS[u.role]||u.role}</span></div><div style="display:flex;flex-direction:column;gap:5px"><a href="/app/sistem-ayarlari" class="btn btn-secondary btn-sm" style="justify-content:center">Hesap Ayarları</a>${u.role==='admin'?'<a href="/app/kullanicilar" class="btn btn-secondary btn-sm" style="justify-content:center">Kullanıcılar</a><a href="/app/durum-yonetimi" class="btn btn-secondary btn-sm" style="justify-content:center">Durum Yönetimi</a>':''}<button onclick="window.supabaseClient.auth.signOut().then(()=>location.href='/login')" class="btn btn-danger btn-sm" style="justify-content:center;margin-top:4px">Çıkış Yap</button></div>`;
  document.getElementById('userMenuModal').style.display='flex';
  if(typeof lucide!=='undefined')lucide.createIcons();
}
function closeUserMenu(){document.getElementById('userMenuModal').style.display='none';}
async function openNotifPanel(){
  const panel=document.getElementById('notifPanel');
  if(panel.style.display!=='none'){panel.style.display='none';return;}
  const list=document.getElementById('notifList');
  try{
    const notifs=await OPT.aktivite.bildirimler();
    if(!notifs.length)list.innerHTML='<div style="text-align:center;padding:16px;font-size:.76rem;color:var(--text-muted)">Bildirim yok</div>';
    else list.innerHTML=notifs.map(n=>`<div style="display:flex;gap:8px;padding:8px 4px;border-bottom:1px solid var(--glass-border)"><div style="width:8px;height:8px;border-radius:50%;background:${n.renk||'#6366f1'};flex-shrink:0;margin-top:4px"></div><div><div style="font-size:.75rem;font-weight:600">${n.baslik||'—'}</div><div style="font-size:.65rem;color:var(--text-muted)">${n.icerik||''}</div></div></div>`).join('');
    panel.style.display='block';
    OPT.aktivite.markAllRead().catch(()=>{});
    const b=document.getElementById('notifBadge');if(b)b.style.display='none';
  }catch{panel.style.display='block';}
}
document.addEventListener('click',e=>{
  const p=document.getElementById('notifPanel');
  if(p&&p.style.display!=='none'&&!e.target.closest('#notifPanel')&&!e.target.closest('#notifBtn'))p.style.display='none';
});

document.addEventListener("DOMContentLoaded",()=>{loadCurrentUser();if(typeof lucide!=="undefined")lucide.createIcons();});

class OptimSidebar{
  constructor(cid,opts={}){this.c=document.getElementById(cid);this.ap=opts.activePage||'';if(this.c){this.render();this.bind();this._autoExp();}}
  render(){
    this.c.innerHTML=`<aside id="mainSidebar" class="sb">
      <div class="sb-hdr"><button id="sbToggle" class="sb-tbtn" aria-label="Menüyü Aç/Kapat"><i data-lucide="panel-left" class="w-5 h-5"></i></button></div>
      <div class="sb-nav">${this._secs()}</div>
      <div class="sb-ftr"><div id="sbUser" class="sb-usr">
        <div class="sb-av" id="avI">U</div>
        <div class="sb-ui"><p class="sb-un" id="sbNm">Kullanıcı</p><p class="sb-ur">Hesap Ayarları</p></div>
        <i data-lucide="chevron-right" class="w-4 h-4 sb-uc"></i>
      </div></div>
`;
    if(typeof lucide!=='undefined')lucide.createIcons();
  }
  _secs(){return MENU_CONFIG.map((s,i)=>`<div class="sb-sec${i===0?' first':''}"><div class="sb-st">${s.section}</div>${s.items.map(it=>it.type==='link'?this._lnk(it):this._sub(it)).join('')}</div>`).join('');}
  _lnk(it){const a=this._isA(it.id,it.href);return `<a href="${it.href}" class="sb-lk${a?' active':''}" data-p="${it.id||''}"><i data-lucide="${it.icon}"></i><span>${it.label}</span></a>`;}
  _sub(it){
    const kids=it.children.map(c=>{
      if(c.isNested){
        const nested=c.nested.map(n=>{const a2=this._isA(null,n.href);return `<div class="sb-ni"><a href="${n.href}" class="sb-sl sb-nl${a2?' active':''}">${n.label}</a></div>`;}).join('');
        return `<div class="sb-si"><button class="sb-sl sb-ntrig" data-nest="${c.nestedId}"><span class="sb-dot"></span>${c.label}<i data-lucide="chevron-down" class="w-3 h-3 sb-nchv"></i></button></div><div class="sb-nc" id="${c.nestedId}">${nested}</div>`;
      }
      const cs=c.comingSoon?`onclick="event.preventDefault();optimiAlert('${c.label} yakında aktif olacak.')"`:'';
      const a=this._isA(null,c.href);
      return `<div class="sb-si"><a href="${c.href||'#'}" class="sb-sl${c.comingSoon?' dim':''}${a?' active':''}" ${cs}><span class="sb-dot"></span>${c.label}${c.comingSoon?'<span class="sb-soon">Yakında</span>':''}</a></div>`;
    }).join('');
    return `<div class="sb-sw"><button data-sub="${it.id}" class="sb-lk sb-trig"><div class="sb-ll"><i data-lucide="${it.icon}"></i><span>${it.label}</span></div><i data-lucide="chevron-down" class="w-4 h-4 sb-chv"></i></button><div id="${it.id}" class="sb-sc">${kids}</div></div>`;
  }
  _isA(pid,href){if(!href||href==='#')return false;if(pid&&this.ap===pid)return true;return window.location.pathname.includes(href.replace(/^\//,''));}
  _autoExp(){const a=this.c.querySelector('.sb-sl.active,.sb-nl.active');if(a){const sc=a.closest('.sb-sc');if(sc){sc.classList.add('open');const ch=sc.previousElementSibling?.querySelector('.sb-chv');if(ch)ch.style.transform='rotate(180deg)';}const nc=a.closest('.sb-nc');if(nc)nc.classList.add('open');}}
  bind(){
    document.getElementById('sbToggle')?.addEventListener('click',()=>document.getElementById('mainSidebar')?.classList.toggle('collapsed'));
    this.c.addEventListener('click',e=>{const sb=document.getElementById('mainSidebar');if(!sb?.classList.contains('collapsed'))return;const hit=e.target.closest('.sb-lk');if(!hit)return;sb.classList.remove('collapsed');},true);
    this.c.querySelectorAll('[data-sub]').forEach(b=>b.addEventListener('click',e=>{e.preventDefault();const m=document.getElementById(b.dataset.sub);const ch=b.querySelector('.sb-chv');const o=m.classList.toggle('open');if(ch)ch.style.transform=o?'rotate(180deg)':'rotate(0)';}));
    this.c.querySelectorAll('[data-nest]').forEach(b=>b.addEventListener('click',e=>{e.preventDefault();const m=document.getElementById(b.dataset.nest);const ch=b.querySelector('.sb-nchv');const o=m.classList.toggle('open');if(ch)ch.style.transform=o?'rotate(180deg)':'rotate(0)';}));
    document.getElementById('sbUser')?.addEventListener('click',()=>optimiAlert('Hesap Ayarları modülü yakında aktif olacak.','Hesap Ayarları'));
  }
  updateUser(n,i){const ne=document.getElementById('sbNm');const ae=document.getElementById('avI');if(ne)ne.textContent=n;if(ae)ae.textContent=i||n.charAt(0).toUpperCase();}
}

// TOPBAR (birebir tasarim-hareketleri.html'den)
(function(){
  const root=document.getElementById('topbar-root');
  root.innerHTML=`<header class="topbar" id="mainTopbar">
    <div class="topbar-left">
      <button id="sidebarToggleTop" class="btn-icon" title="Menüyü Aç/Kapat"><i data-lucide="panel-left" class="w-5 h-5"></i></button>
      <a class="brand" href="/app/genel-durum" aria-label="Optimizi"><span class="brand-text">Optimizi<span class="accent">.App</span></span></a>
    </div>
    <div class="topbar-mid"></div>
    <div class="topbar-right">
      <span class="topbar-pill" id="todayPill"><i data-lucide="calendar" class="w-4 h-4"></i>—</span>
      <div class="fxbar" title="Canlı Kur" style="max-width:320px">
        <span class="fxitem" id="fxEur"><strong>EUR</strong> —</span>
        <span class="fxitem" id="fxUsd"><strong>USD</strong> —</span>
        <span class="fxitem" id="fxUpdated" style="font-size:.68rem;opacity:.7">—</span>
      </div>
      <button onclick="toggleTheme()" class="btn-icon" title="Tema"><i data-lucide="sun" class="w-4 h-4"></i></button>
    </div>
`;
  document.getElementById('sidebarToggleTop').addEventListener('click',()=>document.getElementById('mainSidebar')?.classList.toggle('collapsed'));
  const d=new Date();const dn=['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'];
  document.getElementById('todayPill').innerHTML=`<i data-lucide="calendar" class="w-4 h-4"></i>${dn[d.getDay()]} ${d.toLocaleDateString('tr-TR')}`;
  fetch('https://api.frankfurter.app/latest?from=TRY&to=EUR,USD',{cache:'no-store'})
    .then(r=>r.json()).then(j=>{
      window._kurEUR=1/Number(j.rates.EUR);window._kurUSD=1/Number(j.rates.USD);
      const eur=window._kurEUR.toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:4});
      const usd=window._kurUSD.toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:4});
      document.getElementById('fxEur').innerHTML=`<strong>EUR</strong> ${eur}`;
      document.getElementById('fxUsd').innerHTML=`<strong>USD</strong> ${usd}`;
      document.getElementById('fxUpdated').textContent=new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
      lucide.createIcons();
    }).catch(()=>{});
  lucide.createIcons();
})();

// ── User bilgisi
const _RL={admin:'Yönetici',satis:'Satışçı',tasarim:'Tasarımcı',uretim:'Üretimci',depo:'Depo',izleyici:'İzleyici'};
const _RC={admin:'#6366f1',satis:'#10b981',tasarim:'#8b5cf6',uretim:'#ec4899',depo:'#f59e0b',izleyici:'#94a3b8'};
async function loadCurrentUser(){
  try{
    if(typeof OPT==='undefined')return;
    const u=await OPT.currentUser().catch(()=>null);
    window._optCurrentUser=u; if(!u)return;
    const av=document.getElementById('avI');
    if(av){av.textContent=u.initials||u.name?.[0]||'U';av.style.background=u.avatar_color||'#6366f1';}
    const nm=document.getElementById('sbNm'); if(nm)nm.textContent=u.name||'—';
    const rl=document.getElementById('sbRl'); if(rl)rl.textContent=_RL[u.role]||u.role;
    const tb=document.getElementById('tbAv');
    if(tb){tb.textContent=u.initials||u.name?.[0]||'U';tb.style.background=u.avatar_color||'#6366f1';}
    OPT.aktivite.sayac().then(c=>{
      const b=document.getElementById('notifBadge');if(b)b.style.display=c>0?'block':'none';
    }).catch(()=>{});
  }catch(e){}
}
document.addEventListener('DOMContentLoaded',()=>{
  loadCurrentUser();
  if(typeof lucide!=='undefined')lucide.createIcons();
});
</script>
